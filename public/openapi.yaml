openapi: "3.0.3"
info:
  title: FlipModel ERP API
  version: "1.0.0"
  description: |
    Property flipping and construction project management ERP API.
    All list endpoints support pagination via `page` and `limit` query parameters.
    State-changing requests require a CSRF token in the `x-csrf-token` header.
    Currency: ZAR (South African Rand). VAT rate: 15%.

servers:
  - url: http://localhost:3000
    description: Development
  - url: https://flipmodel.vercel.app
    description: Production

security:
  - cookieAuth: []
    csrfToken: []

tags:
  - name: Auth
    description: Authentication and signup
  - name: Deals
    description: Property deal management
  - name: Contacts
    description: CRM - contractors, suppliers, agents
  - name: Expenses
    description: Deal expense tracking
  - name: Invoices
    description: Invoice management
  - name: GL
    description: General Ledger - journal entries
  - name: ChartOfAccounts
    description: Chart of accounts management
  - name: Payables
    description: Accounts Payable - vendor bills
  - name: Receivables
    description: Accounts Receivable
  - name: PurchaseOrders
    description: Procurement - purchase orders
  - name: Inventory
    description: Inventory management
  - name: Banking
    description: Bank accounts and reconciliation
  - name: FinancialStatements
    description: Balance sheet, income statement, trial balance
  - name: FinancialPeriods
    description: Accounting period management
  - name: Tools
    description: Equipment and tool management
  - name: Milestones
    description: Project milestones
  - name: Tasks
    description: Milestone tasks
  - name: HR
    description: Human resources and payroll
  - name: Notifications
    description: User notifications
  - name: Documents
    description: Document management
  - name: Search
    description: Cross-module search

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
    csrfToken:
      type: apiKey
      in: header
      name: x-csrf-token

  parameters:
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
      description: Items per page

  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasMore:
          type: boolean

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        pagination:
          $ref: "#/components/schemas/Pagination"

    Error:
      type: object
      properties:
        error:
          type: string

    Deal:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        stage:
          type: string
          enum: [lead, quoted, purchased, renovating, listed, sold]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        purchasePrice:
          type: number
        expectedSalePrice:
          type: number
        tags:
          type: array
          items:
            type: string
        data:
          type: object
          description: Detailed deal modelling data (acquisition, property, renovation, resale)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Contact:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        company:
          type: string
        email:
          type: string
        phone:
          type: string
        profession:
          type: string
        dailyRate:
          type: number

    Expense:
      type: object
      properties:
        id:
          type: string
        dealId:
          type: string
        description:
          type: string
        amount:
          type: number
        category:
          type: string
        signOffStatus:
          type: string
          enum: [pending, approved, rejected]
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        id:
          type: string
        invoiceNumber:
          type: string
        dealId:
          type: string
        contactId:
          type: string
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled]
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        subtotal:
          type: number
        tax:
          type: number
        total:
          type: number
        notes:
          type: string
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineItem"

    InvoiceLineItem:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        amount:
          type: number

    JournalEntry:
      type: object
      properties:
        id:
          type: string
        entryNumber:
          type: string
        date:
          type: string
          format: date
        description:
          type: string
        reference:
          type: string
        status:
          type: string
          enum: [draft, posted, reversed]
        lines:
          type: array
          items:
            $ref: "#/components/schemas/JournalLine"

    JournalLine:
      type: object
      properties:
        accountCode:
          type: string
        accountName:
          type: string
        description:
          type: string
        debit:
          type: number
        credit:
          type: number
        dealId:
          type: string
        contactId:
          type: string

    ChartOfAccount:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        type:
          type: string
          description: "Account type (asset, liability, equity, revenue, expense)"
        subtype:
          type: string
        parentId:
          type: string
        isActive:
          type: boolean
        isSystemAccount:
          type: boolean

    VendorBill:
      type: object
      properties:
        id:
          type: string
        billNumber:
          type: string
        contactId:
          type: string
        dealId:
          type: string
        status:
          type: string
          enum: [draft, approved, partially_paid, paid, overdue, cancelled]
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        subtotal:
          type: number
        tax:
          type: number
        total:
          type: number
        amountPaid:
          type: number
        currency:
          type: string
          default: ZAR
        lines:
          type: array
          items:
            $ref: "#/components/schemas/VendorBillLine"

    VendorBillLine:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        amount:
          type: number
        accountCode:
          type: string
        dealId:
          type: string

    CustomerReceivable:
      type: object
      properties:
        id:
          type: string
        invoiceId:
          type: string
        contactId:
          type: string
        dealId:
          type: string
        totalAmount:
          type: number
        amountPaid:
          type: number
        status:
          type: string
          enum: [outstanding, partially_paid, paid, written_off]
        dueDate:
          type: string
          format: date
        currency:
          type: string
          default: ZAR

    PurchaseOrder:
      type: object
      properties:
        id:
          type: string
        poNumber:
          type: string
        contactId:
          type: string
        dealId:
          type: string
        status:
          type: string
          enum: [draft, approved, sent, partially_received, received, cancelled]
        orderDate:
          type: string
          format: date
        expectedDate:
          type: string
          format: date
        subtotal:
          type: number
        tax:
          type: number
        total:
          type: number
        shippingCost:
          type: number
        currency:
          type: string
          default: ZAR
        deliveryAddress:
          type: string
        lines:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderLine"

    PurchaseOrderLine:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        amount:
          type: number
        inventoryItemId:
          type: string
        accountCode:
          type: string

    InventoryItem:
      type: object
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        unit:
          type: string
        quantityOnHand:
          type: number
        reorderPoint:
          type: number
        reorderQuantity:
          type: number
        costPrice:
          type: number
        location:
          type: string

    InventoryTransaction:
      type: object
      properties:
        id:
          type: string
        inventoryItemId:
          type: string
        type:
          type: string
          description: "Transaction type (receipt, issue, adjustment)"
        quantity:
          type: number
        unitCost:
          type: number
        reference:
          type: string
        createdAt:
          type: string
          format: date-time

    BankAccount:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        bankName:
          type: string
        accountNumber:
          type: string
        branchCode:
          type: string
        accountType:
          type: string
          default: cheque
        currency:
          type: string
          default: ZAR
        currentBalance:
          type: number
        accountCode:
          type: string
        isActive:
          type: boolean

    BankTransaction:
      type: object
      properties:
        id:
          type: string
        bankAccountId:
          type: string
        date:
          type: string
          format: date
        description:
          type: string
        amount:
          type: number
        type:
          type: string
        reference:
          type: string
        isReconciled:
          type: boolean

    FinancialPeriod:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [open, closed]

    Tool:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        brand:
          type: string
        model:
          type: string
        serialNumber:
          type: string
        status:
          type: string
          enum: [available, checked_out, maintenance, retired]
        condition:
          type: string
          enum: [new, good, fair, poor]
        purchaseCost:
          type: number
        replacementCost:
          type: number

    Employee:
      type: object
      properties:
        id:
          type: string
        employeeNumber:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        position:
          type: string
        department:
          type: string
        employmentType:
          type: string
          enum: [full_time, part_time, contract, temporary]
        status:
          type: string
          enum: [active, on_leave, terminated, suspended]
        startDate:
          type: string
          format: date
        baseSalary:
          type: number
        hourlyRate:
          type: number

    LeaveRecord:
      type: object
      properties:
        id:
          type: string
        employeeId:
          type: string
        leaveType:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [pending, approved, rejected]
        days:
          type: number

    Payslip:
      type: object
      properties:
        id:
          type: string
        employeeId:
          type: string
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        grossPay:
          type: number
        totalDeductions:
          type: number
        netPay:
          type: number
        status:
          type: string

    Milestone:
      type: object
      properties:
        id:
          type: string
        dealId:
          type: string
        name:
          type: string
        status:
          type: string
        dueDate:
          type: string
          format: date

    Task:
      type: object
      properties:
        id:
          type: string
        milestoneId:
          type: string
        title:
          type: string
        status:
          type: string
        assignedTo:
          type: string
        dueDate:
          type: string
          format: date

    Document:
      type: object
      properties:
        id:
          type: string
        dealId:
          type: string
        name:
          type: string
        url:
          type: string
        type:
          type: string
        createdAt:
          type: string
          format: date-time

paths:
  /api/auth/signup:
    post:
      tags: [Auth]
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 10
                company:
                  type: string
      responses:
        "201":
          description: Account created
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/deals:
    get:
      tags: [Deals]
      summary: List deals
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated list of deals
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Deal"
        "401":
          description: Unauthorized
    post:
      tags: [Deals]
      summary: Create a deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                address:
                  type: string
                purchasePrice:
                  type: number
                expectedSalePrice:
                  type: number
                stage:
                  type: string
                priority:
                  type: string
                notes:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Deal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /api/deals/{dealId}:
    get:
      tags: [Deals]
      summary: Get deal details
      description: Returns full deal with expenses, milestones, contacts, documents, and shopping list items
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deal details with expenses, milestones, contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
        "404":
          description: Not found
    patch:
      tags: [Deals]
      summary: Update a deal
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                stage:
                  type: string
                priority:
                  type: string
                purchasePrice:
                  type: number
                expectedSalePrice:
                  type: number
                tags:
                  type: array
                  items:
                    type: string
                data:
                  type: object
      responses:
        "200":
          description: Deal updated
    delete:
      tags: [Deals]
      summary: Delete a deal
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deal deleted

  /api/contacts:
    get:
      tags: [Contacts]
      summary: List contacts
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - name: role
          in: query
          schema:
            type: string
          description: Filter by contact role
      responses:
        "200":
          description: Paginated contacts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Contact"
    post:
      tags: [Contacts]
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                role:
                  type: string
                company:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                  format: email
                profession:
                  type: string
                dailyRate:
                  type: number
                notes:
                  type: string
                bankName:
                  type: string
                accountNumber:
                  type: string
                branchCode:
                  type: string
                accountType:
                  type: string
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /api/contacts/{contactId}:
    get:
      tags: [Contacts]
      summary: Get contact details
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
    patch:
      tags: [Contacts]
      summary: Update a contact
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                role:
                  type: string
                company:
                  type: string
                phone:
                  type: string
                email:
                  type: string
      responses:
        "200":
          description: Contact updated
    delete:
      tags: [Contacts]
      summary: Delete a contact
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contact deleted

  /api/expenses:
    get:
      tags: [Expenses]
      summary: List expenses
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - name: dealId
          in: query
          schema:
            type: string
          description: Filter expenses by deal
        - name: signOffStatus
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
          description: Filter by approval status
      responses:
        "200":
          description: Paginated expenses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Expense"
    post:
      tags: [Expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dealId, description, amount, category, date]
              properties:
                dealId:
                  type: string
                description:
                  type: string
                amount:
                  type: number
                category:
                  type: string
                date:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        "201":
          description: Expense created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /api/expenses/{expenseId}:
    get:
      tags: [Expenses]
      summary: Get expense details
      parameters:
        - name: expenseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Expense details
        "404":
          description: Not found
    patch:
      tags: [Expenses]
      summary: Update an expense
      parameters:
        - name: expenseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                amount:
                  type: number
                category:
                  type: string
                signOffStatus:
                  type: string
      responses:
        "200":
          description: Expense updated
    delete:
      tags: [Expenses]
      summary: Delete an expense
      parameters:
        - name: expenseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Expense deleted

  /api/invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - name: dealId
          in: query
          schema:
            type: string
          description: Filter invoices by deal
      responses:
        "200":
          description: Paginated invoices
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Invoice"
    post:
      tags: [Invoices]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoiceNumber]
              properties:
                invoiceNumber:
                  type: string
                dealId:
                  type: string
                contactId:
                  type: string
                status:
                  type: string
                issueDate:
                  type: string
                  format: date
                dueDate:
                  type: string
                  format: date
                subtotal:
                  type: number
                tax:
                  type: number
                total:
                  type: number
                notes:
                  type: string
                lineItems:
                  type: array
                  items:
                    $ref: "#/components/schemas/InvoiceLineItem"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /api/invoices/{invoiceId}:
    get:
      tags: [Invoices]
      summary: Get invoice details
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    patch:
      tags: [Invoices]
      summary: Update an invoice
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                dueDate:
                  type: string
                  format: date
                subtotal:
                  type: number
                tax:
                  type: number
                total:
                  type: number
                notes:
                  type: string
                lineItems:
                  type: array
                  items:
                    $ref: "#/components/schemas/InvoiceLineItem"
      responses:
        "200":
          description: Invoice updated
    delete:
      tags: [Invoices]
      summary: Delete an invoice (not paid)
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice deleted
        "400":
          description: Cannot delete paid invoice

  /api/gl:
    get:
      tags: [GL]
      summary: List journal entries
      description: Returns journal entries with their debit/credit lines included
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, posted, reversed]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter entries on or after this date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter entries on or before this date
      responses:
        "200":
          description: Paginated journal entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/JournalEntry"
    post:
      tags: [GL]
      summary: Create a journal entry (debits must equal credits)
      description: Creates a draft journal entry with debit/credit lines. Entry number is auto-generated (JE-XXXXXX).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, description, lines]
              properties:
                date:
                  type: string
                  format: date
                description:
                  type: string
                reference:
                  type: string
                sourceType:
                  type: string
                sourceId:
                  type: string
                notes:
                  type: string
                lines:
                  type: array
                  minItems: 2
                  items:
                    type: object
                    required: [accountCode, accountName]
                    properties:
                      accountCode:
                        type: string
                      accountName:
                        type: string
                      description:
                        type: string
                      debit:
                        type: number
                      credit:
                        type: number
                      dealId:
                        type: string
                      contactId:
                        type: string
      responses:
        "201":
          description: Journal entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

